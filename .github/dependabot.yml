version: 2
updates:
  # Root package.json (monorepo root)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      # Group minor/patch updates together
      npm-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Backend
  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      backend-deps:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Renderer (Next.js)
  - package-ecosystem: "npm"
    directory: "/renderer"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      renderer-deps:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Admin (Vite/React)
  - package-ecosystem: "npm"
    directory: "/admin"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      admin-deps:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Infrastructure (CDK)
  - package-ecosystem: "npm"
    directory: "/infra"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      cdk-deps:
        patterns:
          - "aws-cdk*"
          - "@aws-cdk/*"
          - "constructs"
