version: 2
updates:
  # Single config for monorepo - npm workspaces handles subdirectories
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      # Group ALL updates into fewer PRs
      all-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    # Ignore major version bumps - review manually
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
